<!DOCTYPE html>
<html>
  <head>
    <script>
      // Redirect all paths to index.html for SPA routing
      var path = window.location.pathname;
      window.location.replace(
        window.location.origin + '/randb-site-valuator/' +
        '?redirect=' + encodeURIComponent(path)
      );
    </script>
  </head>
</html>
